<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>King of Fenix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">
  <h1>KING OF FENIX</h1>
  <p>Guild of Legends</p>
</div>

<div class="form-section">
  <h2>Join Guild</h2>

  <form id="regForm">
    <input type="text" id="nama" placeholder="Nama" required>
    <input type="text" id="hp" placeholder="No HP" required>
    <input type="text" id="ign" placeholder="IGN">
    <input type="text" id="avatar" placeholder="Avatar URL">
    <button type="submit">Daftar</button>
  </form>

  <p id="status"></p>
</div>

<div class="section">
  <h2>Members</h2>
  <div id="members" class="grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
