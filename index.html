<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King Of Fenix</title>

<link rel="stylesheet" href="style.css">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet"
/>
</head>

<body>

<header>

<div class="overlay"></div>

<div class="hero-content">

<h1>KING OF FENIX</h1>

<p>Guild Database & Quest Center</p>

<a href="#members" class="btn">
View Members
</a>

</div>

</header>

<section class="stats">

<div class="card">
<h2 id="memberCount">0</h2>
<p>Members</p>
</div>

<div class="card">
<h2>120</h2>
<p>Completed Quest</p>
</div>

<div class="card">
<h2>57</h2>
<p>Active Players</p>
</div>

<div class="card">
<h2>12</h2>
<p>Officers</p>
</div>

</section>

<section id="members">

<h2 class="section-title">
Guild Members
</h2>

<div id="memberList" class="member-grid">

</div>

</section>

<section>

<h2 class="section-title">
Guild Quest
</h2>

<div class="quest-list">

<div class="quest">
<h3>Weekly Raid</h3>
<p>Complete raid 5x</p>
</div>

<div class="quest">
<h3>Guild Donation</h3>
<p>Donate 5000 Gold</p>
</div>

<div class="quest">
<h3>Boss Hunt</h3>
<p>Kill 3 World Bosses</p>
</div>

</div>

</section>

<footer>

KING OF FENIX © 2026

</footer>

<script src="script.js"></script>

</body>
</html>
