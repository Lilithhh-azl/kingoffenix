<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>King of Fenix GUILD</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        King of Fenix GUILD
    </div>

    <nav>
        <a href="#home">Home</a>
        <a href="#guild">Guild</a>
        <a href="#register">Register</a>
        <a href="#members">Members</a>
    </nav>
</header>

<section id="home" class="hero">

    <div class="overlay">

        <h1>WELCOME TO King of Fenix</h1>

        <p>
            Unite. Conquer. Dominate the MMORPG World.
        </p>

        <button onclick="document.getElementById('register').scrollIntoView()">
            Join Guild
        </button>

    </div>

</section>

<section id="guild" class="guild-info">

    <h2>Guild Information</h2>

    <div class="cards">

        <div class="card">
            <h3>Guild Level</h3>
            <p>99</p>
        </div>

        <div class="card">
            <h3>Total Members</h3>
            <p id="memberCount">0</p>
        </div>

        <div class="card">
            <h3>Guild Power</h3>
            <p>999,999</p>
        </div>

    </div>

</section>

<section id="register" class="register">

    <h2>Guild Registration</h2>

    <form id="registerForm">

  <input type="text" id="nickname" placeholder="Nickname" required>

  <input type="text" id="panggilan" placeholder="Panggilan" required>

  <input type="text" id="nomor" placeholder="No HP" required>

  <button type="submit">Register</button>

</form>

</section>

<section id="members" class="members">

    <h2>Guild Members</h2>

   <table>
  <thead>
    <tr>
      <th>Nickname</th>
      <th>Panggilan</th>
      <th>Nomor</th>
    </tr>
  </thead>

  <tbody id="membersTable"></tbody>
</table>

</section>

<footer>
    © 2026 KOF
</footer>

<script src="script.js"></script>

</body>
</html>
