<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>King of Fenix</title>

<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>KING OF FENIX</h1>
  <p>Guild of Legends • Rise From Ashes</p>
</section>

<!-- FORM -->
<section class="form-section">
  <h2>Join Guild</h2>

  <form id="regForm">
    <input id="nama" type="text" placeholder="Nama" required>
    <input id="hp" type="text" placeholder="No HP" required>
    <input id="ign" type="text" placeholder="IGN">
    <input id="avatar" type="text" placeholder="Avatar URL">
    <button type="submit">Register</button>
  </form>

  <p id="status"></p>
</section>

<!-- MEMBERS -->
<section class="members-section">
  <h2>Members</h2>
  <div id="members" class="grid"></div>
</section>

<script src="./script.js"></script>

</body>
</html>
